name: Runner Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - app/**
      - assets/**
      - src/**
      - app.json
      - .github/workflows/runner-android-apk.yml
      - .github/workflows/release-android-apk.yml
      - scripts/configure-android-release.js
      - package.json
      - package-lock.json
      - tsconfig.json

jobs:
  runner-android-apk:
    name: Build debug APK on GitHub runner
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Generate Android project
        run: CI=1 npx expo prebuild --platform android --clean

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace --info

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: islemind-android-debug-universal-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
